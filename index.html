<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>noname M0</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; background: #111315; color: #f2f2ee; }
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .app { display: grid; grid-template-columns: minmax(320px, 420px) 1fr; min-height: 100vh; }
      .workbench { display: grid; grid-template-rows: 1fr auto minmax(72px, auto); gap: 12px; padding: 16px; background: #181b1d; }
      #editor { width: 100%; min-height: 320px; background: #0e1012; color: #f8f3df; border: 1px solid #363a3e; padding: 14px; font: 14px/1.5 monospace; }
      .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      select { min-width: 180px; border: 1px solid #51606a; border-radius: 6px; padding: 8px 10px; background: #101315; color: #f2f2ee; }
      input[type="text"] { border: 1px solid #51606a; border-radius: 6px; padding: 8px 10px; background: #101315; color: #f2f2ee; font: 13px monospace; }
      #ws-status { font: 12px monospace; color: #9aa4ab; }
      .stage-wrap { position: relative; }
      #stage { display: block; width: 100%; height: 100vh; background: #060708; }
      #fps { position: absolute; top: 8px; right: 12px; font: 12px/1.3 monospace; color: #d8e96b; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; }
      #boot { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center; background: #111315; color: #f2f2ee; font: 16px/1.5 system-ui, sans-serif; }
      #boot.hidden { display: none; }
      #boot.ready { inset: auto 12px 12px auto; display: block; padding: 6px 8px; border: 1px solid #3d454b; border-radius: 6px; background: #181b1d; color: #d8e96b; font: 12px/1.3 monospace; }
      #boot code { color: #d8e96b; }

      /* 狭い画面(スマホ等)では2カラム固定だとキャンバス側に幅が残らず
         レンダリング結果が見えなくなるため、縦積みに切り替える。
         キャンバスを上に、エディタ類を下に(order)。 */
      @media (max-width: 760px) {
        .app { grid-template-columns: minmax(0, 1fr); grid-template-rows: auto auto; }
        .stage-wrap { order: -1; height: 45vh; }
        #stage { height: 45vh; }
        .workbench { min-height: unset; }
        #editor { min-height: 200px; }
      }
    </style>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <div id="boot">
      <div>
        <strong>noname M0</strong><br>
        HTML loaded. Waiting for <code>dist/main.js</code>...
      </div>
    </div>
    <main class="app">
      <section class="workbench">
        <textarea id="editor" spellcheck="false">out (circle (0.3 + 0.1 * sin time) |> fill white) <> 0.5s</textarea>
        <div class="toolbar">
          <button id="prev-example" type="button">Prev</button>
          <select id="example-picker" aria-label="Dream code examples"></select>
          <button id="next-example" type="button">Next</button>
          <span id="status">auto</span>
        </div>
        <div class="toolbar">
          <input id="ws-url" type="text" placeholder="WebSocket URL (ws.value)" size="28">
          <input id="ws-path" type="text" placeholder="JSON path (例: current.temp_c)" size="20">
          <span id="ws-status"></span>
        </div>
        <pre id="diagnostics" aria-live="polite"></pre>
      </section>
      <div class="stage-wrap">
        <canvas id="stage"></canvas>
        <span id="fps"></span>
      </div>
    </main>
    <noscript>JavaScript is required for the M0 runtime.</noscript>
    <script>
      window.addEventListener("error", function (event) {
        var boot = document.getElementById("boot");
        if (boot) boot.innerHTML = "<div><strong>noname M0 boot error</strong><br><code>" + String(event.message) + "</code></div>";
      });
      window.addEventListener("unhandledrejection", function (event) {
        var boot = document.getElementById("boot");
        var reason = event.reason && event.reason.message ? event.reason.message : event.reason;
        if (boot) boot.innerHTML = "<div><strong>noname M0 async boot error</strong><br><code>" + String(reason) + "</code></div>";
      });
    </script>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
